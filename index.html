<style>
  :root{
    --ai:#20509e;          /* 瑠璃色 clear lapis blue — same hue family as the summer sky */
    --ai-deep:#16336b;     /* 紺瑠璃 deep lapis */
    --murasaki:#5654a2;    /* 桔梗色 blue-violet, a summer flower */
    --murasaki-soft:#8886c4;
    --midori:#3f7a4f;      /* 夏の緑 fresh summer green */
    --wa:#f3efe4;          /* washi cream */
    --wa-2:#ece4d0;
    --gold:#c7a869;
    --yellow:#f7d243;      /* 黄色 */
    --ink:#1c1b18;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0; background:var(--wa); color:var(--ink); font-family:"Zen Kaku Gothic New",sans-serif; line-height:1.85;}
  a{color:inherit;}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.01ms !important; transition-duration:.01ms !important;}}

  .jp-serif{font-family:"Shippori Mincho", serif;}
  .en{font-family:"Cormorant Garamond", serif;}

  /* twilight gradient rule — signature divider, purple to indigo like dusk over the West Gate */
  .twilight-rule{ height:5px; width:100%; background:linear-gradient(90deg, var(--murasaki), var(--ai) 60%, var(--ai-deep)); }

  /* ================ HERO ================ */
  .hero-top{
    background:var(--ai-deep);
    color:var(--wa); text-align:center; padding:.9rem 6vw;
  }
  .hero-top .eyebrow{ font-size:1.05rem; letter-spacing:.3em; color:#f9e576; font-weight:400; }
  .photo-title{
    text-align:center; font-family:"Shippori Mincho",serif; font-weight:800;
    font-size:clamp(2rem,6vw,3.4rem); letter-spacing:.02em; color:#fff; line-height:1.25;
    text-shadow:0 3px 22px rgba(22,51,107,.75);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    margin:0;
  }
  .photo-title .jp-line{ display:block; font-size:.62em; margin-top:.2rem; letter-spacing:.1em; }
  .hero-card{
    background:rgba(243,239,228,.97); color:var(--ink); padding:.65rem 1.4rem;
    display:inline-flex; flex-direction:column; gap:.15rem; justify-content:center;
    border-top:3px solid #f9e576; max-width:min(92%, 660px);
    box-shadow:0 14px 34px rgba(22,51,107,.35);
  }
  .hero-card div{ text-align:center; }
  .hero-card .v{ font-size:clamp(.9rem,2.1vw,1.25rem); font-weight:700; font-family:"Shippori Mincho",serif; }

  .hero-photo{
    position:relative; width:100%; line-height:0; background:var(--ai-deep);
    aspect-ratio: 1400 / 1600; overflow:hidden;
  }
  .hero-photo img{ width:100%; height:100%; object-fit:cover; object-position:top; display:block; }
  .photo-overlay{
    position:absolute; top:3.5%; left:0; right:0; z-index:2;
    display:flex; flex-direction:column; align-items:center; gap:.9rem;
    line-height:1.7;
  }
  .photo-tagline{
    position:absolute; bottom:6%; left:50%; transform:translateX(-50%); z-index:2;
    width:max-content; max-width:92%;
    text-align:center; font-family:"Shippori Mincho",serif; font-weight:700;
    font-size:clamp(1.05rem, 2.6vw, 1.5rem); color:#fff; letter-spacing:.05em;
    text-shadow:0 2px 18px rgba(10,20,45,.65);
    background:rgba(22,51,107,.45);
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
    padding:.5rem 1.4rem .6rem;
    border-radius:6px;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    line-height:1.7;
  }
  .photo-tagline a{
    display:inline-block; margin-top:.2rem; font-family:"Zen Kaku Gothic New",sans-serif;
    font-size:.68em; font-weight:500; color:#fff; text-decoration:none;
    border-bottom:1px solid rgba(255,255,255,.85); padding-bottom:2px; letter-spacing:.08em;
  }

  /* ================ INTERSTITIAL IMAGE BAND ================ */
  .band{ position:relative; height:46vh; min-height:280px; overflow:hidden; }
  .band img{ width:100%; height:100%; object-fit:cover; }
  .band::after{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(28,42,82,.05), rgba(18,25,58,.4)); }
  .band .cap{
    position:absolute; bottom:1rem; right:1.4rem; z-index:2; color:var(--wa); font-size:.7rem; letter-spacing:.15em;
    font-family:"Cormorant Garamond", serif; font-style:italic; opacity:.85;
  }

  /* ================ SECTIONS ================ */
  section{ padding:1.1rem 7vw; }
  .about{
    max-width:620px; margin:0 auto; text-align:center;
  }
  .about-text .tag{ font-size:.7rem; letter-spacing:.25em; color:var(--murasaki); margin-bottom:.8rem; }
  .about-text h2{ font-family:"Shippori Mincho",serif; font-size:1.7rem; margin:0 0 1rem; }
  .about-text p{ margin:0 0 .9rem; font-size:.98rem; }
  .about-text p.en{ font-size:1.05rem; color:#453f36; }
  .about-text a{
    display:inline-block; margin-top:.4rem; font-size:.82rem; letter-spacing:.08em;
    border-bottom:1px solid var(--murasaki); padding-bottom:2px; text-decoration:none; color:var(--murasaki);
  }
  .about-text .tag, .about-text h2{ text-align:center; }

  /* ---- event detail (indigo) ---- */
  .event-section{ background:var(--ai); color:var(--wa); }
  .event-inner{ max-width:760px; margin:0 auto; text-align:center; }
  .event-inner .tag{ font-size:.7rem; letter-spacing:.25em; color:var(--gold); margin-bottom:1rem; }
  .event-inner h2{ font-family:"Shippori Mincho",serif; font-size:1.9rem; margin:0 0 2rem; }
  .detail-grid{ display:flex; flex-direction:column; gap:.8rem; align-items:center; text-align:center; }
  .detail-grid .v{ font-size:1.15rem; }

  /* ---- instructor ---- */
  .instructor{ max-width:640px; margin:0 auto; }
  .instructor .name-jp{ font-family:"Shippori Mincho",serif; font-size:1.3rem; margin:0 0 .1rem; }
  .instructor .name-en{ font-family:"Cormorant Garamond",serif; font-style:italic; color:#6b6357; margin:0 0 .6rem; }
  .instructor p{ font-size:.9rem; color:#453f36; margin:0; }

  /* ---- contact ---- */
  .contact-section{ text-align:center; background:linear-gradient(180deg, var(--wa) 0%, var(--wa-2) 100%); }
  .contact-section .tag{ font-size:.7rem; letter-spacing:.25em; color:var(--murasaki); margin-bottom:1rem; }
  .contact-box{ display:inline-block; padding:1.8rem 2.4rem; border:1px solid var(--gold); margin-top:.5rem; }
  .contact-box .name{ font-family:"Shippori Mincho",serif; font-size:1.4rem; }
  .contact-box .name-en{ font-family:"Cormorant Garamond",serif; font-style:italic; color:#6b6357; margin-bottom:.7rem; }
  .contact-box a.mail{ font-size:.9rem; color:var(--ai); border-bottom:1px solid var(--ai); text-decoration:none; }

  footer{ background:var(--ai-deep); color:#f9e576; text-align:center; padding:2rem 6vw; font-size:.7rem; letter-spacing:.1em; }

  @media (max-width:760px){
    .about{ grid-template-columns:1fr; }
    .instructor{ grid-template-columns:1fr; text-align:center; }
    .instructor img{ max-width:160px; margin:0 auto; }
    section{ padding:1.1rem 6vw; }
  }
</style>
</head>
